<!doctype html>
<!-- index.html 
    Dynamic multiplication table displayer -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multiplication v2</title>
    
    <!-- load stylesheets -->
    <!-- bootstapp stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- jquery ui stylesheet -->
    <link href="https://code.jquery.com/ui/1.14.1/themes/smoothness/jquery-ui.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    
    <div class="container">
        <h1>Multiplication Matrix</h1>
        <p></p>

        <!-- form -->
        <form id="multiplication-form" class="cmxform row g-3">
            <div class="col-md-6">
                <label for="">Minimum Column Value (-50 to 50)</label>
                <input id="inputColMin" class="form-control" name="colMin" type="number"></input>
                <div id="sliderColMin" class="form-control"></div>
            </div>
            <div class="col-md-6">
                <label for="">Maximum Column Value (-50 to 50)</label>
                <input id="inputColMax" class="form-control" name="colMax" type="number"></input>
                <div id="sliderColMax" class="form-control"></div>
            </div>

            <div class="col-md-6">
                <label for="">Minimum Row Value (-50 to 50)</label>
                <input id="inputRowMin" class="form-control" name="rowMin" type="number"></input>
                <div id="sliderRowMin" class="form-control"></div>
            </div>
            <div class="col-md-6">
                <label for="">Maximum Row Value (-50 to 50)</label>
                <input id="inputRowMax" class="form-control" name="rowMax" type="number"></input>
                <div id="sliderRowMax" class="form-control"></div>
            </div>
            
        </form>

        <!-- multiplication table -->
        <div id="multiplication-table-container" class="table-responsive" style="margin-top: 30px;">
            <table id="multiplication-table" class="table border table-bordered "></table>
        </div>

        <div>
            <button id="save" type="button">Save table</button>
        </div>

        <!-- tabbed interface with default preview tab -->
        <div id="tabs-container" class="col-md-12">
            <ul>
                <li><a href="#tab-1">Preview</a></li>
            </ul>
            <div id="tab-1">
                <h3>Saved</h3>
                <p>Save tables will appear here</p>
            </div>
        </div>

    </div>
    
    <!-- load jquery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- load validation plugin -->
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.21.0/dist/jquery.validate.min.js"></script>
    <!-- load jquery ui plugin -->
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
    <!-- load js file -->
    <script src="src/main.js"></script>
    
</body>

</html>
