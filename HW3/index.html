<!doctype html>
<!-- index.html 
    Dynamic multiplication table displayer -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <!-- inputs -->
    <div class="container justify-content-center col-md-6">
        <div class="row">
            <div class="form-group col-md-6">
                <label for="">Minimum Column Value</label>
                <input id="inputColMin" class="form-control" type="number" placeholder="Enter number between -50 to 50"></input>
            </div>
            <div class="form-group col-md-6">
                <label for="">Maximum Column Value</label>
                <input id="inputColMax" class="form-control" type="number" placeholder="Enter number between -50 to 50"></input>
            </div>
        </div>
        
        <div class="row">
            <div class="form-group col-md-6">
                <label for="">Minimum Row Value</label>
                <input id="inputRowMin" class="form-control" type="number" placeholder="Enter number between -50 to 50"></input>
            </div>
            <div class="form-group col-md-6">
                <label for="">Maximum Row Value</label>
                <input id="inputRowMax" class="form-control" type="number" placeholder="Enter number between -50 to 50"></input>
            </div>
        </div>

        <!-- submit button -->
        <button id="submit" type="button" onclick="drawTable()">Submit</button>

        <!-- multiplication table -->
        <div id="tableContainer">
            <table id="matrix" class="table table-sm table-bordered border-primary"></table>
        </div>
    
        <script src="src/main.js"></script>
    </div>
  </body>
</html>
