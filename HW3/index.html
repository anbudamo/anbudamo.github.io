<!doctype html>
<!-- index.html 
    Dynamic multiplication table displayer -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    
    <div class="container">
        <h1>Multiplication Matrix</h1>
        <p></p>

        <!-- form -->
        <form class="row g-3">
            <div class="col-md-6">
                <label for="">Minimum Column Value</label>
                <input id="inputColMin" class="form-control" type="number"
                    placeholder="Enter number between -50 to 50"></input>
            </div>
            <div class="col-md-6">
                <label for="">Maximum Column Value</label>
                <input id="inputColMax" class="form-control" type="number"
                    placeholder="Enter number between -50 to 50"></input>
            </div>

            <div class="col-md-6">
                <label for="">Minimum Row Value</label>
                <input id="inputRowMin" class="form-control" type="number"
                    placeholder="Enter number between -50 to 50"></input>
            </div>
            <div class="col-md-6">
                <label for="">Maximum Row Value</label>
                <input id="inputRowMax" class="form-control" type="number"
                    placeholder="Enter number between -50 to 50"></input>
            </div>

            <div class="">
                <label id="formError" class="text-danger"></label>
            </div>

            <!-- submit button -->
            <div class="col-md-12">
                <button id="submit" type="button" onclick="drawTable()">Submit</button>
            </div>
            
        </form>

        <!-- multiplication table -->
        <div class="table-responsive" style="margin-top: 30px;">
            <table id="multiplication-table" class="table border table-bordered"></table>
        </div>

    </div>
    <script src="src/main.js"></script>
</body>

</html>
