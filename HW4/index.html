<!doctype html>
<!-- index.html 
    Dynamic multiplication table displayer -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Matrix</title>
    
    <!-- load stylesheets -->
    <!-- bootstrap stylesheet -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- jquery ui stylesheet -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/smoothness/jquery-ui.css">
    <!-- custom styles -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- main bootstrap container -->
    <div class="navbar bg-light mb-5 px-3">
        <a class="navbar-brand" href="#">QuickMatrix</a>
    </div>
    <div class="container">
        <div class="matrix-container d-flex">
            <form class="bg-light">
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label" for="minRow">Minimum row value</label>
                        <div id="min-row-slider" class="ui-slider" for="minRow"></div>
                    </div>
                    <input id="minRow" name="minRow" class="form-control" type="number" value="0"></input>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label" for="maxRow">Maximum row value</label>
                        <div id="max-row-slider" class="ui-slider" for="maxRow"></div>
                    </div>
                    <input id="maxRow" name="maxRow" class="form-control" type="number" value="0"></input>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label" for="minCol">Minimum column value</label>
                        <div id="min-col-slider"class="ui-slider" for="minCol"></div>
                    </div>
                    <input id="minCol" name="minCol" class="form-control" type="number" value="0"></input>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label" for="maxCol">Maximum column value</label>
                        <div id="max-col-slider" class="ui-slider" for="maxCol"></div>
                    </div>
                    <input id="maxCol" name="maxCol" class="form-control" type="number" value="0"></input>
                </div>

                <div class="mt-4">
                    <button id="save" type="button" class="btn btn-dark" disabled>Save</button>
                </div>
            </form>

            <div id="table-container" class="table-responsive">
                <div id="table" class="table">
                    <thead></thead>
                    <tbody></tbody>
                </div>
            </div>
        </div>
        

        <div id="tabs" class="my-5">
            <ul>
            </ul>
        </div>
    </div>
    
    <!-- load jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <!-- load validation plugin -->
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/jquery.validate.min.js"></script>
    <!-- load jquery ui plugin -->
    <script src="https://code.jquery.com/ui/1.13.3/jquery-ui.js"></script>
    <!-- custom script -->
    <script src="src/main.js"></script>
    
</body>

</html>
